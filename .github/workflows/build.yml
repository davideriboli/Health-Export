name: Build & Sign APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── JDK ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle (no wrapper jar needed) ───────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: false

      # ── Android SDK ──────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Decode keystore from secret ──────────────────────────────────────
      - name: Decode keystore
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.jks

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_FILE:     ${{ github.event_name != 'pull_request' && format('{0}/release.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --stacktrace

      # ── Build debug APK on PRs (no signing) ─────────────────────────────
      - name: Build debug APK (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        run: gradle assembleDebug --stacktrace

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: HealthExport-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
